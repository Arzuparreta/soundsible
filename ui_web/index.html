<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0c0e" />
    <link rel="icon" type="image/svg+xml" href="assets/icons/logo-mark.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
    <title>Soundsible</title>
    <!-- Apply stored theme before paint (incl. system → prefers-color-scheme). -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var preference =
            stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'dark';
          var resolved =
            preference === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : preference;
          document.documentElement.dataset.theme = resolved;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', resolved === 'light' ? '#f6f6f7' : '#0c0c0e');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
