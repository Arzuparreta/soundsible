name: Fresh Clone Bootstrap Smoke

on:
  pull_request:
  push:
    branches: [main]

jobs:
  bootstrap-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fresh clone bootstrap smoke test
        run: |
          python -c "import run; print('bootstrap import ok')"
