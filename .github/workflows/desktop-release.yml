name: Desktop Release

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for artifacts (e.g. 0.1.0-beta.1)"
        required: true
        default: "0.1.0-beta.1"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev \
            librsvg2-dev libssl-dev patchelf build-essential curl unzip

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop-shell/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build sidecar and FFmpeg
        env:
          BUNDLE_FFMPEG: "1"
        run: ./desktop-shell/scripts/build-sidecar.sh

      - name: Build Tauri bundles
        working-directory: desktop-shell
        env:
          SOUNDSIBLE_REPO_ROOT: ${{ github.workspace }}
        run: |
          npm ci
          npm run build

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: soundsible-desktop-linux-${{ github.ref_name }}
          path: |
            desktop-shell/src-tauri/target/release/bundle/deb/*.deb
            desktop-shell/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop-shell/src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: warn

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop-shell/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build sidecar and FFmpeg
        shell: bash
        env:
          BUNDLE_FFMPEG: "1"
        run: ./desktop-shell/scripts/build-sidecar.sh

      - name: Build Tauri bundles
        working-directory: desktop-shell
        env:
          SOUNDSIBLE_REPO_ROOT: ${{ github.workspace }}
        run: |
          npm ci
          npm run build

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: soundsible-desktop-windows-${{ github.ref_name }}
          path: |
            desktop-shell/src-tauri/target/release/bundle/msi/*.msi
            desktop-shell/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
