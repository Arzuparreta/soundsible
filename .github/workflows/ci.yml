name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Phase 1 gates (pytest)
        env:
          PYTHONPATH: .
        run: pytest -q
      - name: Coverage report
        env:
          PYTHONPATH: .
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under=30 tests/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Bandit security scan
        run: bandit -r . -f txt -o bandit-report.txt || true
      - name: Show bandit report
        run: cat bandit-report.txt

  ui_build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui_web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui_web/package-lock.json
      - name: Install JS dependencies
        run: npm ci
      - name: Build player bundle (vite + tailwind)
        run: npm run build
