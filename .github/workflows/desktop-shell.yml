name: Desktop Shell CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'desktop-shell/**'
      - 'shared/**'
      - 'soundsible_engine.py'
      - 'run.py'
      - 'tests/test_desktop_engine_smoke.py'
      - 'tests/test_desktop_bootstrap.py'
      - 'tests/test_desktop_engine_entry.py'
      - 'requirements.txt'
      - '.github/workflows/desktop-shell.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'desktop-shell/**'
      - 'shared/**'
      - 'soundsible_engine.py'
      - 'run.py'
      - 'tests/test_desktop_engine_smoke.py'
      - 'tests/test_desktop_bootstrap.py'
      - 'tests/test_desktop_engine_entry.py'
      - 'requirements.txt'
      - '.github/workflows/desktop-shell.yml'

jobs:
  desktop_engine_smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Desktop engine smoke (dev Python)
        env:
          PYTHONPATH: .
        run: pytest tests/test_desktop_engine_smoke.py::test_desktop_engine_smoke_python -q

  desktop_sidecar_and_tauri:
    runs-on: ubuntu-latest
    needs: desktop_engine_smoke
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            build-essential

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop-shell/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build PyInstaller sidecar
        run: ./desktop-shell/scripts/build-sidecar.sh

      - name: Desktop engine smoke (PyInstaller sidecar)
        env:
          PYTHONPATH: .
          SOUNDSIBLE_ENGINE_BIN: desktop-shell/src-tauri/binaries/soundsible-engine-x86_64-unknown-linux-gnu
        run: pytest tests/test_desktop_engine_smoke.py::test_desktop_engine_smoke_sidecar -q

      - name: Build Tauri desktop shell
        working-directory: desktop-shell
        env:
          SOUNDSIBLE_REPO_ROOT: ${{ github.workspace }}
        run: |
          npm ci
          npm run build

  desktop_sidecar_windows:
    runs-on: windows-latest
    needs: desktop_engine_smoke
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop-shell/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build PyInstaller sidecar (Windows)
        shell: bash
        run: ./desktop-shell/scripts/build-sidecar.sh

      - name: Desktop engine smoke (PyInstaller sidecar)
        shell: bash
        env:
          PYTHONPATH: .
          SOUNDSIBLE_ENGINE_BIN: desktop-shell/src-tauri/binaries/soundsible-engine-x86_64-pc-windows-msvc.exe
        run: pytest tests/test_desktop_engine_smoke.py::test_desktop_engine_smoke_sidecar -q

      - name: Build Tauri desktop shell (Windows)
        working-directory: desktop-shell
        env:
          SOUNDSIBLE_REPO_ROOT: ${{ github.workspace }}
        run: |
          npm ci
          npm run build
